name: repro
on: [push, pull_request]

# Reproducible-build verification.
#
# We build twice on the SAME runner (clean target/ in between) and
# compare a SHA3-256 over the concatenated, name-sorted final binaries.
# They must be bit-identical.
#
# Why same-runner, not cross-distro: ubuntu-24.04 ships a newer glibc +
# linker than ubuntu-22.04. Linking against different system libraries
# produces different binaries no matter what we do — true cross-distro
# bit-identity would need a hermetic toolchain (Nix, Docker, or static
# musl). Same-runner determinism is the meaningful claim we can make
# today: "given identical inputs (source + lockfile + toolchain +
# system libs), seck always builds to identical bytes". The hermetic-
# cross-distro extension is tracked as a follow-up to Plan 15.
#
# Per-artifact knobs (strip, codegen-units, debug, opt-level) live in
# [profile.release] in Cargo.toml — see that file for why. RUSTFLAGS
# here is reserved for LINK-time flags only.

jobs:
  determinism:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libseccomp-dev build-essential cmake clang

      - name: build A
        run: SOURCE_DATE_EPOCH=1700000000 RUSTFLAGS="-C link-arg=-Wl,-z,relro,-z,now" cargo build --release --workspace --locked
      - name: hash A
        id: a
        run: |
          H=$(find target/release -maxdepth 1 -type f -executable -print0 | sort -z | xargs -0 cat | openssl dgst -sha3-256 | awk '{print $2}')
          echo "sha3=$H" >> $GITHUB_OUTPUT

      - name: clean target/
        run: cargo clean

      - name: build B
        run: SOURCE_DATE_EPOCH=1700000000 RUSTFLAGS="-C link-arg=-Wl,-z,relro,-z,now" cargo build --release --workspace --locked
      - name: hash B
        id: b
        run: |
          H=$(find target/release -maxdepth 1 -type f -executable -print0 | sort -z | xargs -0 cat | openssl dgst -sha3-256 | awk '{print $2}')
          echo "sha3=$H" >> $GITHUB_OUTPUT

      - name: compare
        run: |
          A="${{ steps.a.outputs.sha3 }}"
          B="${{ steps.b.outputs.sha3 }}"
          if [ "$A" = "$B" ]; then
            echo "OK — bit-identical across two builds on the same runner ($A)"
          else
            echo "BUILD NOT REPRODUCIBLE: $A vs $B"
            exit 1
          fi
