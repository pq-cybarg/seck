[package]
name = "seck-escape-tests"
edition = "2024"
version = "0.0.0"
publish = false

[lints.rust]
unsafe_code = "allow"   # probe is a Linux-only test harness that calls libc directly

[lints.clippy]
all = "deny"

[[bin]]
name = "escape_probe"
path = "src/bin/escape_probe.rs"

[dependencies]

[target.'cfg(target_os = "linux")'.dependencies]
seck-sandbox = { path = "../../crates/seck-sandbox" }
libc = "0.2"

[dev-dependencies]
assert_cmd = "2"
